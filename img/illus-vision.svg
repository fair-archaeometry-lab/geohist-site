<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 140">
  <!-- Hintergrund -->
  <rect x="0" y="0" width="260" height="140" rx="8" fill="#f5f5f7"/>

  <!-- GeoHist-Knoten in der Mitte -->
  <rect x="100" y="50" width="60" height="40" rx="6" fill="#005f83"/>
  <text x="130" y="73" font-size="10" fill="#f5f5f7" text-anchor="middle">GeoHist</text>

  <!-- Datenquellen links -->
  <rect x="20" y="30" width="60" height="24" rx="4" fill="#ffffff" stroke="#d0d7de"/>
  <text x="50" y="45" font-size="7" fill="#333" text-anchor="middle">Datenquellen</text>
  <!-- kleine „Stacks“ unter der Box -->
  <rect x="32" y="60" width="36" height="6" rx="2" fill="#c8d4a3"/>
  <rect x="32" y="68" width="36" height="6" rx="2" fill="#d0b28c"/>
  <rect x="32" y="76" width="36" height="6" rx="2" fill="#b18a68"/>

  <!-- Nutzer:innen rechts -->
  <circle cx="210" cy="55" r="10" fill="#ffffff" stroke="#34495e"/>
  <circle cx="210" cy="85" r="10" fill="#ffffff" stroke="#34495e"/>
  <circle cx="190" cy="70" r="9" fill="#ffffff" stroke="#34495e"/>

  <!-- Verbindungslinien GeoHist <-> Datenquellen -->
  <line x1="80" y1="50" x2="100" y2="60" stroke="#3498db" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="80" y1="70" x2="100" y2="70" stroke="#3498db" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- Verbindung GeoHist <-> Nutzer:innen -->
  <line x1="160" y1="60" x2="190" y2="55" stroke="#3498db" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="160" y1="70" x2="190" y2="70" stroke="#3498db" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="160" y1="80" x2="210" y2="85" stroke="#3498db" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- Untertitel / Vision -->
  <text x="130" y="120" font-size="8" fill="#555" text-anchor="middle">
    Föderierte Forschungsdaten zwischen Quellen und Community
  </text>
</svg>